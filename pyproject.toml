[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "graba-reunion"
version = "0.1.0"
description = "Graba mic + monitor PulseAudio y transcribe con faster-whisper"
requires-python = ">=3.9"
dependencies = []

[project.scripts]
graba-reunion = "graba_reunion.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
